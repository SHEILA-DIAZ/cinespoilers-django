<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cinespoilers</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f4f4f4; }
        tr:hover { background-color: #f9f9f9; }
    </style>
</head>
<body>
    <h1>🎬 Películas</h1>
    <table>
        <thead>
            <tr>
                <th>Título</th>
                <th>Año</th>
                <th>Rating</th>
            </tr>
        </thead>
        <tbody>
            {% for movie in movies %}
            <tr>
                <td>{{ movie.title }}</td>
                <td>{{ movie.release_year }}</td>
                <td>{{ movie.rating }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">No hay películas registradas.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
